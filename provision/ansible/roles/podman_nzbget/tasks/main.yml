- name: Copy service files
  become: true
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ directory_systemd }}/{{ item }}"
    owner: root
    group: root
    mode: "0o644"
  loop:
    - nzbget-main.service
    - nzbget.service
  notify: Restart nzbget

- name: Enable and check nzbget service
  become: true
  ansible.builtin.systemd:
    enabled: true
    name: nzbget
  notify: Restart nzbget
